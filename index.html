<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Todo App</title>
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 48px 16px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      width: 100%;
      max-width: 520px;
      padding: 32px;
    }

    h1 {
      font-size: 1.8rem;
      font-weight: 700;
      color: #1a1a2e;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 0.9rem;
      color: #888;
      margin-bottom: 28px;
    }

    .input-row {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-row input {
      flex: 1;
      padding: 12px 16px;
      border: 2px solid #e8e8f0;
      border-radius: 10px;
      font-size: 0.95rem;
      color: #333;
      outline: none;
      transition: border-color 0.2s;
    }

    .input-row input:focus {
      border-color: #667eea;
    }

    .input-row input::placeholder {
      color: #bbb;
    }

    .btn-add {
      padding: 12px 20px;
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.2s, transform 0.1s;
    }

    .btn-add:hover {
      opacity: 0.9;
    }

    .btn-add:active {
      transform: scale(0.97);
    }

    .stats {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 0.82rem;
      color: #999;
      margin-bottom: 14px;
    }

    .stats span strong {
      color: #555;
    }

    .clear-btn {
      background: none;
      border: none;
      color: #e05c5c;
      font-size: 0.82rem;
      cursor: pointer;
      padding: 2px 4px;
      border-radius: 4px;
      transition: background 0.15s;
    }

    .clear-btn:hover {
      background: #ffeaea;
    }

    .todo-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .todo-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      background: #f8f8fc;
      border-radius: 10px;
      border: 1px solid #ebebf5;
      transition: background 0.15s, transform 0.1s;
      animation: slideIn 0.2s ease;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateY(-8px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .todo-item:hover {
      background: #f0f0fa;
    }

    .todo-item input[type="checkbox"] {
      appearance: none;
      -webkit-appearance: none;
      width: 20px;
      height: 20px;
      border: 2px solid #c0c0d8;
      border-radius: 6px;
      cursor: pointer;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s, border-color 0.15s;
    }

    .todo-item input[type="checkbox"]:checked {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
    }

    .todo-item input[type="checkbox"]:checked::after {
      content: '';
      position: absolute;
      left: 4px;
      top: 1px;
      width: 6px;
      height: 10px;
      border: 2px solid #fff;
      border-top: none;
      border-left: none;
      transform: rotate(45deg);
    }

    .todo-text {
      flex: 1;
      font-size: 0.95rem;
      color: #333;
      word-break: break-word;
      line-height: 1.4;
      transition: color 0.2s, text-decoration 0.2s;
    }

    .todo-text.done {
      text-decoration: line-through;
      color: #bbb;
    }

    .btn-delete {
      background: none;
      border: none;
      color: #ccc;
      font-size: 1.1rem;
      cursor: pointer;
      padding: 4px 6px;
      border-radius: 6px;
      line-height: 1;
      flex-shrink: 0;
      transition: color 0.15s, background 0.15s;
    }

    .btn-delete:hover {
      color: #e05c5c;
      background: #ffeaea;
    }

    .empty-state {
      text-align: center;
      padding: 32px 0;
      color: #ccc;
    }

    .empty-state .icon {
      font-size: 2.5rem;
      margin-bottom: 10px;
    }

    .empty-state p {
      font-size: 0.9rem;
    }

    .filters {
      display: flex;
      gap: 6px;
      margin-bottom: 16px;
    }

    .filter-btn {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e8e8f0;
      border-radius: 8px;
      background: none;
      font-size: 0.85rem;
      font-weight: 600;
      color: #999;
      cursor: pointer;
      transition: border-color 0.15s, color 0.15s, background 0.15s;
    }

    .filter-btn:hover {
      border-color: #667eea;
      color: #667eea;
    }

    .filter-btn.active {
      background: linear-gradient(135deg, #667eea, #764ba2);
      border-color: transparent;
      color: #fff;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>My Tasks</h1>
    <p class="subtitle">Stay organised, get things done.</p>

    <div class="input-row">
      <input type="text" id="taskInput" placeholder="Add a new task…" maxlength="200" />
      <button class="btn-add" onclick="addTask()">Add</button>
    </div>

    <div class="filters">
      <button class="filter-btn active" id="filter-all" onclick="setFilter('all')">All</button>
      <button class="filter-btn" id="filter-active" onclick="setFilter('active')">Active</button>
      <button class="filter-btn" id="filter-completed" onclick="setFilter('completed')">Completed</button>
    </div>

    <div class="stats">
      <span id="statsText"></span>
      <button class="clear-btn" id="clearBtn" onclick="clearCompleted()" style="display:none;">
        Clear completed
      </button>
    </div>

    <ul class="todo-list" id="todoList"></ul>

    <div class="empty-state" id="emptyState">
      <div class="icon">✅</div>
      <p>No tasks yet — add one above!</p>
    </div>
  </div>

  <script>
    let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
    let currentFilter = 'all';

    const input      = document.getElementById('taskInput');
    const list       = document.getElementById('todoList');
    const emptyState = document.getElementById('emptyState');
    const statsText  = document.getElementById('statsText');
    const clearBtn   = document.getElementById('clearBtn');

    function saveTasks() {
      localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    function setFilter(filter) {
      currentFilter = filter;
      ['all', 'active', 'completed'].forEach(f => {
        document.getElementById('filter-' + f).classList.toggle('active', f === filter);
      });
      render();
    }

    function getFilteredTasks() {
      if (currentFilter === 'active')    return tasks.filter(t => !t.completed);
      if (currentFilter === 'completed') return tasks.filter(t =>  t.completed);
      return tasks;
    }

    function render() {
      list.innerHTML = '';

      const total        = tasks.length;
      const done         = tasks.filter(t => t.completed).length;
      const hasCompleted = done > 0;
      const filtered     = getFilteredTasks();

      statsText.innerHTML = total === 0 ? '' : `<strong>${done}</strong> of <strong>${total}</strong> completed`;
      clearBtn.style.display = hasCompleted ? 'inline-block' : 'none';

      if (filtered.length === 0) {
        emptyState.style.display = 'block';
        const messages = {
          all:       'No tasks yet — add one above!',
          active:    'No active tasks. Nice work! 🎉',
          completed: 'No completed tasks yet.'
        };
        emptyState.querySelector('p').textContent = messages[currentFilter];
      } else {
        emptyState.style.display = 'none';

        filtered.forEach((task) => {
          const index = tasks.indexOf(task);
          const li = document.createElement('li');
          li.className = 'todo-item';

          const checkbox = document.createElement('input');
          checkbox.type = 'checkbox';
          checkbox.checked = task.completed;
          checkbox.addEventListener('change', () => toggleTask(index));

          const span = document.createElement('span');
          span.className = 'todo-text' + (task.completed ? ' done' : '');
          span.textContent = task.text;

          const delBtn = document.createElement('button');
          delBtn.className = 'btn-delete';
          delBtn.innerHTML = '&#10005;';
          delBtn.title = 'Delete task';
          delBtn.addEventListener('click', () => deleteTask(index));

          li.appendChild(checkbox);
          li.appendChild(span);
          li.appendChild(delBtn);
          list.appendChild(li);
        });
      }
    }

    function addTask() {
      const text = input.value.trim();
      if (!text) {
        input.focus();
        return;
      }
      tasks.unshift({ text, completed: false });
      saveTasks();
      render();
      input.value = '';
      input.focus();
    }

    function toggleTask(index) {
      tasks[index].completed = !tasks[index].completed;
      saveTasks();
      render();
    }

    function deleteTask(index) {
      tasks.splice(index, 1);
      saveTasks();
      render();
    }

    function clearCompleted() {
      tasks = tasks.filter(t => !t.completed);
      saveTasks();
      render();
    }

    // Allow pressing Enter to add a task
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') addTask();
    });

    render();
  </script>
</body>
</html>
